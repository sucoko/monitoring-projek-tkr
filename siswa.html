<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Monitoring Siswa</title>

<style>
body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}
.container{
    max-width:1100px;
    margin:auto;
}
.header{
    background:#1A5276;
    color:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}
.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}
.big{
    font-size:40px;
    font-weight:bold;
    color:#1A5276;
}
.good{color:#1E8449;}
.warn{color:#D35400;}
.bad{color:#C0392B;}
select{
    width:100%;
    padding:10px;
    font-size:16px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
}
th{
    background:#1A5276;
    color:white;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>📊 Portal Monitoring Proyek Siswa</h1>
<p>Otomotif Muda Berkarya</p>
</div>

<div class="card">
<label><b>Pilih Tim</b></label>
<select id="timSelect"></select>
</div>

<div class="grid">

<div class="card">
<h3>Nilai Terakhir</h3>
<div id="nilai" class="big">-</div>
</div>

<div class="card">
<h3>Status</h3>
<div id="status" class="big">-</div>
</div>

</div>

<div class="card">
<h3>Aktivitas Terakhir</h3>
<div id="aktivitas">-</div>
</div>

<div class="card">
<h3>Kendala</h3>
<div id="kendala">-</div>
</div>

<div class="card">
<h3>Rekomendasi Guru</h3>
<div id="rekomendasi">-</div>
</div>

<div class="card">
<h3>Riwayat Monitoring</h3>

<table>
<thead>
<tr>
<th>Minggu</th>
<th>Nilai</th>
<th>Status</th>
<th>Guru</th>
</tr>
</thead>

<tbody id="historyBody"></tbody>

</table>

</div>

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSTw5WCjtQ946XQXXjuRjF-dwkinuuxUgROyFvexYSABBF9r66PMkggNyJyn7zxf41r44nPD2Ytelc9/pub?gid=0&single=true&output=csv";

let allData = [];

async function loadData(){

    const response = await fetch(CSV_URL);
    const csv = await response.text();

    const rows = csv.trim().split("\n");

    allData = rows.slice(1).map(row => {

        const cols = row.split(",");

        return {
            timestamp: cols[0],
            guru: cols[1],
            tim: cols[2],
            minggu: cols[3],
            nilai: cols[4],
            aktivitas: cols[5],
            kendala: cols[6],
            rekomendasi: cols[7],
            status: cols[8]
        };

    });

    const teams =
    [...new Set(allData.map(x => x.tim))];

    const select =
    document.getElementById("timSelect");

    select.innerHTML="";

    teams.forEach(team=>{

        const opt =
        document.createElement("option");

        opt.value=team;
        opt.textContent=team;

        select.appendChild(opt);

    });

    if(teams.length>0){
        tampilkanTim(teams[0]);
    }

}

function tampilkanTim(team){

    const data =
    allData.filter(x=>x.tim===team);

    const last =
    data[data.length-1];

    document.getElementById("nilai").textContent =
    last.nilai;

    document.getElementById("status").textContent =
    last.status;

    document.getElementById("aktivitas").textContent =
    last.aktivitas;

    document.getElementById("kendala").textContent =
    last.kendala;

    document.getElementById("rekomendasi").textContent =
    last.rekomendasi;

    document.getElementById("historyBody").innerHTML =
    data.map(x=>`
    <tr>
      <td>${x.minggu}</td>
      <td>${x.nilai}</td>
      <td>${x.status}</td>
      <td>${x.guru}</td>
    </tr>
    `).join("");

}

document.getElementById("timSelect")
.addEventListener("change",function(){

    tampilkanTim(this.value);

});

loadData();

</script>

</body>
</html>
