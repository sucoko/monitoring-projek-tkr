<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Monitoring Siswa</title>

<style>

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    background:#1A5276;
    color:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

label{
    font-weight:bold;
}

select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.nilai{
    font-size:42px;
    font-weight:bold;
    color:#1A5276;
}

.status{
    font-size:20px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#1A5276;
    color:white;
}

.loading{
    text-align:center;
    padding:30px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>📊 Portal Monitoring Proyek Siswa</h1>
<p>Monitoring Proyek Otomotif Muda Berkarya</p>
</div>

<div class="card">
<label>Pilih Tim</label>
<select id="timSelect">
<option>Memuat data...</option>
</select>
</div>

<div class="grid">

<div class="card">
<h3>Nilai Terakhir</h3>
<div id="nilai" class="nilai">-</div>
</div>

<div class="card">
<h3>Status</h3>
<div id="status" class="status">-</div>
</div>

</div>

<div class="card">
<h3>Aktivitas Terakhir</h3>
<p id="aktivitas">-</p>
</div>

<div class="card">
<h3>Kendala</h3>
<p id="kendala">-</p>
</div>

<div class="card">
<h3>Rekomendasi Guru</h3>
<p id="rekomendasi">-</p>
</div>

<div class="card">
<h3>Riwayat Monitoring</h3>

<table>
<thead>
<tr>
<th>Minggu</th>
<th>Nilai</th>
<th>Status</th>
<th>Guru</th>
</tr>
</thead>

<tbody id="historyBody">
<tr>
<td colspan="4" align="center">Memuat data...</td>
</tr>
</tbody>

</table>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwfW6LmhZmy4idGeAsw8Nd7Feqss1m_jGNFRrMAABn_Szg5t9R3un-AHNfcupy8SYtOMQ/exec";

let allData = [];

async function loadData(){

    try{

        const response = await fetch(API_URL);

        const text = await response.text();

        allData = JSON.parse(text);

        const teams = [...new Set(allData.map(item => item.tim))];

        const select = document.getElementById("timSelect");

        select.innerHTML = "";

        teams.forEach(team => {

            const option = document.createElement("option");

            option.value = team;
            option.textContent = team;

            select.appendChild(option);

        });

        if(teams.length > 0){
            tampilkanTim(teams[0]);
        }

    }catch(error){

        console.error(error);

        document.getElementById("timSelect").innerHTML =
        "<option>Gagal memuat data</option>";

    }

}

function tampilkanTim(namaTim){

    const dataTim =
    allData.filter(item => item.tim === namaTim);

    if(dataTim.length === 0) return;

    const terakhir =
    dataTim[dataTim.length - 1];

    document.getElementById("nilai").textContent =
    terakhir.nilai;

    document.getElementById("status").textContent =
    terakhir.status;

    document.getElementById("aktivitas").textContent =
    terakhir.aktivitas;

    document.getElementById("kendala").textContent =
    terakhir.kendala;

    document.getElementById("rekomendasi").textContent =
    terakhir.rekomendasi;

    document.getElementById("historyBody").innerHTML =
    dataTim.map(item => `
        <tr>
            <td>${item.minggu}</td>
            <td>${item.nilai}</td>
            <td>${item.status}</td>
            <td>${item.guru}</td>
        </tr>
    `).join("");

}

document
.getElementById("timSelect")
.addEventListener("change", function(){

    tampilkanTim(this.value);

});

loadData();

</script>

</body>
</html>
